      summary: Валидность ключа пользователя {validity_usertoken}
      operationId: validity_usertoken
      description: |
        **Проверка валидности пользовательского ключа (UserToken)** <br><br>
        Процесс включает проверку корректности и актуальности предоставленного ключа пользователя `UserToken`. Данный ключ используется для идентификации клиента и доступа к защищённым ресурсам системы.<br><br>
        Если ключ валиден, клиент сохраняет доступ к своим данным и функциональности системы. В противном случае, при выявлении недействительности ключа, потребуется повторное прохождение процедуры аутентификации для получения нового ключа.
      tags:
        - authorization
      parameters:
        - name: salon_id
          in: path
          description: >-
            Идентификатор салона. Можно передавать ID любого салона. На авторизацию это не влияет
          required: true
          schema:
            type: string
          example: 5dff0980-ffd9-453c-b116-f09f405f0603
        - name: usertoken
          in: header
          description: Ключ клиента
          required: true
          schema:
            type: string
          example: 5dff0370-ffd9-453c-b116-f09f405f0603
