      summary: Получить стоимость корзины с покупками {cart_cost}
      operationId: cart_cost
      description: Метод возвращает данные с корзиной товаров
      tags:
        - online-store
      parameters:
        - name: salon_id
          in: path
          description: ID салона
          required: true
          schema:
            type: string
        - name: cart
          in: query
          description: |
            Строка json с массивом объектов.
            - `purchase_id` (required) - Идентификатор номенклатуры
            - `count` (required) - Количество номенклатуры

            Пример такой строки:
            [{"purchase_id":"9ad49672-a043-11e7-ab37-000c2938171c", "count":2},{"purchase_id":"8bac3895-9e13-11e7-9966-0050568bd50c", "count":1}]

          required: true
          schema:
            type: string
        - name: delivery
          in: query
          description: |-
            Строка json с объектом доставки.
            - `id` (required) - Идентификатор номенклатуры доставки
            - `price` (required) - Стоимость услуги доставки
          schema:
            type: string
        - name: cart_pay
          in: query
          description: |-
            Строка json с объектом предварительных оплат.
            - `type` (required) - Тип оплаты ("cash" - оплата наличными, "card" - оплата картой, "deposit" - оплата с лицевого счета, "bonus" - оплата с бонусного счета)
            - `amount` (required) - Сумма оплаты
            - `id` (optional) - Идентификатор лицевого счета (необходимо передавать только при оплате с лицевого/бонусного счета)
          schema:
            type: string
        - name: client
          in: query
          description: |-
            Строка json с объектом данных клиента.
            - `phone` (optional, string) - Телефон клиента. Необходим, если в заголовках не передается usertoken
            - `last_name` (optional, string) - Фамилия клиента. Требуется, если в заголовках не передается usertoken
            - `name` (optional, string) - Имя клиента. Необходимо, если в заголовках не передается usertoken
            - `second_name` (optional, string) - Отчество клиента. Если в заголовках не передается usertoken, то данный параметр будет добавлен создаваемому клиенту.
            - `birthday` (optional, string) - Дата рождения в формате: "31.12.1990". Если в заголовках не передается usertoken, то данный параметр будет добавлен создаваемому клиенту.
          schema:
            type: string
        - name: promocode
          in: query
          description: Применяемый промокод.
          schema:
            type: string
        - name: usertoken
          in: header
          description: Ключ клиента
          required: false
          schema:
            type: string
          example: 7e8245d1-574f-4ce8-88ec-7e34358df45
