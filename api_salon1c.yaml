      summary: Токен клиента при исходящей авторизации {auth_token}
      operationId: auth_token
      description: |
        **Получение клиентского токена после подтверждения номера телефона**

        Данный метод возвращает клиентский токен *(UserToken)*, если клиент успешно подтвердил свой номер телефона.

        1. **Успешное подтверждение**.
        При успешном подтверждении номера телефон клиент получает уникальный токен, который используется для дальнейших операций и доступа к системе.

        2. **Ошибка подтверждения**.
        Если номер телефона не был подтвержден, метод вернёт ошибку с кодом 1201. Это означает, что клиент не завершил процесс подтверждения.

        **Параметры:**
        <br>
        `method` — определяет способ, которым было выполнено подтверждение номера телефона. Доступные варианты авторизации можно получить через метод ["Доступные способы авторизации"](#operation/auth_types), где значение параметра `method` должно быть равно `outgoing`.
        <br><br>
      tags:
