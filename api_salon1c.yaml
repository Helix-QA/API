              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Запрос на подтверджения номера телефона (исходящий) {auth_request}
      operationId: auth_request
      description: |
        Данный метод используется для подтверждения номера телефона клиента. При его вызове формируется запрос на подтверждение номера, который требует от клиента выполнения одного из следующих действий:
        - Отправить сообщение в мессенджер
        - Совершить звонок на указанный номер

        **Параметры:**
        - `method`- определяет способ подтверждения. Доступные варианты авторизации можно получить через метод ["Доступные способы авторизации"](#operation/auth_types)

        **Способы подтверждения:**
        - `outgoing_telegram` — отправка сообщения в Telegram-бот
        - `outgoing_call` — подтверждение через звонок
        - `outgoing_whatsapp` — отправка сообщения в WhatsApp

        **Проверка подтверждения:**<br>
        Проверить успешность подтверждения можно при помощи метода [*{auth_token}*](#operation/auth_token)

        ----
        **Ответ метода:**<br>
        В ответе метода будет содержаться информация, необходимая для подтверждения номера, в зависимости от выбранного способа (значение параметра `method`):
        - `outgong_id`— возвращает номер телефона или идентификатор бота в *Telegram*, который необходимо использовать для подтверждения.
        - `link`- возвращается URL, по которому клиент должен перейти для завершения процедуры подтверждения номера телефона.
      tags:
        - authorization
      parameters:
        - name: salon_id
          in: path
          description: Идентификатор салона.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            example:
              phone: "79876543210"
              method: outgoing_telegram
              request_id: 27dd2f8e-32a4-11ee-b18f-f02f7488d897
            schema:
              type: object
              required:
                - phone
              properties:
                request_id:
                  type: string
                  example: 27dd2f8e-32a4-11ee-b18f-f02f7488d897
                  description: Идентификатор запроса.
                phone:
                  type: string
                  example: "79876543210"
                  description: Номер телефона клиента. Должен передаваться в формате
                method:
                  type: string
                  example: '"outgoing_telegram"'
                  description: Способ получения кода подтверждения. см. метод ["Доступные способы авторизации"](#operation/auth_types)
                name:
                  type: string
                  description: Имя клиента
                last_name:
                  type: string
                  description: Фамилия клиента
                second_name:
                  type: string
                  description: Отчество клиента
                birthday:
                  type: string
                  example: 31.12.1990
                  description: "Дата рождения в формате: 31.12.1990"
                email:
                  type: string
                  example: test@mail.ru
                  description: Электронная почта клиента
