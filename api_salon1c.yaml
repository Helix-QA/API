      | 1014  | Не указан эквайринговый терминал оплаты                                                  |
      | 1015  | Обнаружено дублирование id транзакции                                                    |
      | 1016  | Прерывание транзакции при пополнении лицевого счета                                      |
      | 1017  | Не найден лицевой счет                                                                   |
      | ...   | ...                                                                                      |
      | 1040  | Не найден метод                                                                          |
      | 1050  | Не найден сотрудник                                                                      |
      | 1051  | Не найдена услуга                                                                        |
      | 1052  | Не задан временной интервал                                                              |
      | 1053  | Для клиента установлен запрет онлайн-записи                                              |
      | 1054  | Неверный формат даты                                                                     |
      | 1055  | Не найден салон                                                                          |
      | 1056  | Не найден визит                                                                          |
      | 1057  | Не выбрана кассовая смена                                                                |
      | 1058  | Не найдена кассовая смена                                                                |
      | 1059  | Не задан номер чека                                                                      |
      | 1060  | Неверная структура массива оплат                                                         |
      | 1061  | Не указано время начала визита                                                           |
      | 1062  | Не указан ключ авторизации                                                               |
      | 1063  | Неверный ключ авторизации                                                                |
      | 1064  | Неверный код подтверждения                                                               |
      | 1065  | Не указан логин                                                                          |
      | 1066  | Не указан ключ клиента                                                                   |
      | 1067  | Неверный ключ клиента                                                                    |
      | 1068  | Код подтверждения не действителен                                                        |
      | 1069  | Неверный Email                                                                           |
      | 1070  | Неверное время настройки напоминания о занятии                                           |
      | 1071  | Не задан массив записи                                                                   |
      | 1072  | Неверный параметр rating                                                                 |
      | 1073  | Неверный формат параметра page                                                           |
      | 1074  | Неверный формат параметра count                                                          |
      | 1075  | Неверный формат длительности записи                                                      |
