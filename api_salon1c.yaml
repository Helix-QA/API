      summary: Авторизация с цифровой подписью {private_auth}
      operationId: private_auth
      description: |
        Процесс авторизации клиента осуществляется на основании переданных данных и защищённой цифровой подписи (`sign`).

        ---

        1. **Проверка данных клиента.**
        Система обрабатывает и проверяет переданные клиентcкие данные для идентификации, такие как номер телефона или другие учетные сведения.

        2. **Проверка цифровой подписи (sign).**
        Защищённая подпись (sign) используется для дополнительной проверки подлинности переданных данных и гарантирует их целостность. Эта подпись генерируется на основе уникальных данных клиента и подтверждает, что данные не были изменены при передаче. Подпись генерируется с использованием криптографического алгоритма хэширования SHA-1

        3. **Авторизация и доступ.**
        При успешной проверке данных и подписи клиент получает доступ к системе. В случае несоответствия подписи или некорректных данных авторизация отклоняется, и клиенту предлагается повторить попытку с корректными сведениями.

        ---
        Цифровая подпись `sign` представляет собой хеш, сформированный с использованием алгоритма **SHA1**.\
        \
        Цифровая подпись формируется из переданных данных и имеет следующий формат:
          `birthday;31.12.1990;email;test@mail.ru;last_name;Иванов;name;Иван;phone;79876543210;second_name;Иванович;sex;1`

          - `birthday` - дата рождения,
          - `email` - электронная почта,
          - `last_name` - фамилия,
          - `name` - имя,
          - `phone` - номер телефона,
          - `second_name` - отчество,
          - `sex` - пол клиента: <ul><li> 1 - мужской </li><li> 2 - женский </li></ul>

          В случае, если какое-либо из полей пустое, в строку для хеширования необходимо включать только ключ без значения, например:
          `birthday;;email;test@mail.ru;last_name;Иванов;name;Иван;phone;79876543210;second_name;;sex;`

      tags:
        - authorization
      parameters:
        - name: salon_id
          in: path
          description: >-
            Идентификатор салона. Можно передавать ID любого салона. На авторизацию это не влияет
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            example:
              name: Антон
              second_name: Андреевич
              phone: "077729462"
              sign: fa8ec54b5df3127309e391d65ad24115a3530771
            schema:
              type: object
              required:
                - sign
              properties:
                name:
                  type: string
                  description: Имя клиента
                second_name:
                  type: string
                  description: Отчество клиента
                last_name:
                  type: string
                  description: Фамилия клиента
                phone:
                  type: string
                  example: "79876543210"
                  description: "Телефон клиента:"
                email:
                  type: string
                  description: Email клиента
                sex:
                  type: string
                  description: Пол клиента (1 - мужской, 2 - женский)
                birthday:
                  type: string
                  example: 31.12.1990
                  description: "Дата рождения в формате:"
                sign:
                  type: string
                  description: Цифровая подпись
  /hs/api/v1/auth_request/{salon_id}:
    post:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  Parameters:
                    description: Данные ответа
                    type: object
                    properties:
                      outgoing_id:
                        description: "Данные для подтверждения (идентификатор или номер телефона) "
                        type: string
                      link:
                        description: Ссылка на отправку подтверждения
                        type: string
                      request_id:
                        description: Идентифкатор запроса
                        type: string
                      method:
                        description: |
                          Тип подтверждения номера:
                          - `outgoing_telegram` - через Telegram
                          - `outgoing_call` - через звонок
                          - `outgoing_whatsapp` - через Whatsapp
                        type: string
                  Errors:
                    $ref: "#/components/schemas/Errors"
