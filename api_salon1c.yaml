      summary: Получение прайс-листа {price_list}
      operationId: price_list
      description: Метод возвращает массив структур номенклатуры. Цены возвращаются по виду цен, указанному в настройках номенклатуры.
      tags:
        - online-store
      parameters:
        - name: salon_id
          in: path
          description: ID салона
          required: true
          schema:
            type: string
        - name: type
          in: query
          description: |
            Тип номенклатуры:
            - "product" - товар
            - "package" - пакет услуг
            - "gift_certificate" - подарочный сертификат
          schema:
            type: string
        - name: product_id
          in: query
          description: >

            Строка Json с массивом строк, содержащим параметры "product_id"
            идентификатор номенклатуры.

            Пример такой строки: ["9ad49672-a043-11e7-ab37-000c2938171c", "8bac3895-9e13-11e7-9966-0050568bd50c"]
          schema:
            type: string
        - name: group_id
          in: query
          description: Идентификатор группы номенклатур.
          schema:
            type: string
        - name: page_count
          in: query
          description: Количество единиц номенклатуры, которое необходимо получить.
          schema:
            type: string
        - name: page_number
          in: query
          description: Номер страницы с которой начинать счет.
          schema:
            type: string
        - name: search_line
          in: query
          description: Строка поиска, должна содержать минимум 3 символа.
          schema:
            type: string
        - name: without_remainder
          in: query
          description: Булевский параметр. Если параметр = Истина, то будут возвращены товары без учета остатка, иначе только товары с остатком больше нуля. Значение по умолчанию - Ложь.
          schema:
            type: boolean
        - name: with_group
          in: query
          description: Булевский параметр. Если параметр = Истина, то будет возвращен массив групп для товаров. Значение по умолчанию - Ложь.
