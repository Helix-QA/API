      | 1082  | Неверная подпись                                                                         |
      | 1083  | Неверный тип номенклатуры                                                                |
      | 1084  | Передан неверный список покупок                                                          |
      | 1085  | Не найден вид цен                                                                        |
      | 1086  | Лицевой счет закрыт                                                                      |
      | 1087  | Клиент не может произвести оплату с лицевого счета                                       |
      | 1088  | Недостаточно средств на лицевом счету                                                    |
      | 1089  | Бонусный счет закрыт                                                                     |
      | 1090  | Клиент не может произвести оплату с бонусного счета                                      |
      | 1091  | Не найден сформированный заказ                                                           |
      | ...   | ...                                                                                      |
      | 1100  | Сотрудник не оказывает выбранную услугу                                                  |
      | 1101  | Сотрудник не может оказать услугу в выбранное время                                      |
      | 1102  | Сотрудник не работает в указанное время                                                  |
