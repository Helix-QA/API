      summary: Запись на визит {book_record}
      operationId: book_record
      description: |
        Осуществляет запись на услугу клиента на указанное время к выбранному сотруднику.
        Клиент определяется по ключу клиента (UserToken), получаемому при авторизации и передаваемому в заголовке запроса.

        При первом вызове создается визит и возвращается идентификатор визита. Если в момент первого вызова после создания визита на лицевом счету клиента достаточно средств для оплаты визита и включена возможность предоплаты услуг,
        то будет произведена оплата визита с лицевого счета клиента на аванс (оплата будет произведена только по тем услугам, у которых включен тумблер предоплаты и нет пакета услуг, который может быть основанием для этого визита)

        Если передано несколько услуг, время оказания которых пересекается, то считается, что это параллельные услуги. Если эти услуги нельзя оказывать одновременно, то будет возвращена ошибка.
        Если у клиента есть пакет услуг, который может быть основанием для этого визита, то он будет использоваться в качестве оплаты.

      tags:
        - bookings
      parameters:
        - name: salon_id
          in: path
          description: Идентификатор салона.
          required: true
          schema:
            type: string
        - name: usertoken
          in: header
          description: Ключ клиента
          required: true
          schema:
            type: string
          example: 256D323401901DB2BD42405FA54509B0
      requestBody:
        content:
          application/json:
            example:
              comment: Комментарий визита
              commercial: "salon1c.ru"
              record_array:
                - datetime: 20230412T1115"
                  service_id: "aca979fc-3e92-11ea-96b8-38d547b31ac0"
                  staff_id: "933a9758-ed6f-4cb3-bffa-e7edcaa13e58"
              fullname: "Иванов Иван Иванович"
              promocode: Тест
            schema:
              type: object
              properties:
                record_array:
                  $ref: "#/components/schemas/RecordArray"
                  description: Массив записей. Является обязательным, если не передан идентификатор визита.
                fullname:
                  type: string
                  description: Фамилия, имя, отчество клиента, разделенные пробелами. Если передан данный параметр, то игнорируются параметры name, last_name и second_name
                name:
                  type: string
                  description: Имя клиента
                last_name:
                  type: string
                  description: Фамилия клиента
                second_name:
                  type: string
                  description: Отчество клиента
                birthday:
                  type: string
                  description: 'Дата рождения в формате: "31.12.1990".'
                email:
                  type: string
                  description: Адрес электронной почты клиента
                notify_by_sms:
                  type: number
                  description: Время до напоминания о записи в часах
                comment:
                  type: string
                  description: Комментарий к визиту
                commercial:
                  type: string
                  description: Рекламный источник
                record_id:
                  type: string
                  description: Идентификатор визита. Если передан, то остальные параметры передавать не нужно
                promocode:
                  type: string
                  description: Промокод
