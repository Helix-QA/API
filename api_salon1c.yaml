components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Использовать при отправке запросов напрямую в базу, т.е при отправке запросов по адресу http://cloud.salon1c.ru/api, авторизацию использовать не надо
    apiKey:
      type: apiKey
      in: header
      name: apikey
      description: "Ключ приложения. Указан во внешней системе (Example: **110132e6-ba129-4120-ac33-fcd612380121**)"
  schemas:
    BadRequest:
      description: Некорректный запрос
      type: object
      properties:
        Parameters:
          type: [object, "null"]
          description: Данные ответа
        Errors:
          $ref: "#/components/schemas/Errors"
      required:
        - Parameters

      example:
        Parameters: null
        Errors: { code: 1050, message: "Не найден объект" }
    AuthorizationError:
      description: Ошибка авторизации. Проверьте правильно ли переданы данные авторизации
      type: string
    InternalServerError:
      description: Внутренняя ошибка сервера
      type: object
      properties:
        Parameters:
          type: [object, "null"]
          description: Данные ответа
        Errors:
          $ref: "#/components/schemas/Errors"
      required:
        - Parameters
      example:
        Parameters: null
        Errors: { code: 1000, message: "Ошибка работы с базой данных." }
    Errors:
      description: Структура ошибки
      type: object
      properties:
        code:
          description: Код ошибки (см. Дополнительная информация)
          type: [number, "null"]
          example: 0
        message:
          description: Описание ошибки (см. Дополнительная информация)
          type: [string, "null"]
          example: "Описание ошибки"
    ID:
      description: "Идентификатор объекта"
      type: string
      format: uuid
      example: "689c34d8-79ee-11ec-b13e-f02f7488d897"
    Title:
      type: string
      example: "Наменование элемента"
      description: "Наименование"
    SortOrder:
      type: integer
      example: 0
      description: "Индекс сортировки"
    IDTitle:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ID"
        title:
          $ref: "#/components/schemas/Title"
      required:
        - id
        - title
    IDTitleSortOrder:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ID"
        title:
          $ref: "#/components/schemas/Title"
        sort_order:
          $ref: "#/components/schemas/SortOrder"
      required:
        - id
        - title
    MayBePayment:
      type: array
      description: Массив структур возможных оплат (возвращается, если статус визита "TemporarilyReservedNeedPayment")
      items:
        type: object
        properties:
          id:
            description: Идентификатор лицевого/бонусного счета
            $ref: "#/components/schemas/ID"
          title:
            $ref: "#/components/schemas/Title"
          type:
            type: string
            description: |
              Тип счета:
              - `deposit` - лицевой
              - `bonus` - бонусный
          payment_amount:
            type: number
            description: Возможная сумма оплаты лицевым/бонусным счетом
    Promotions:
      description: Массив применяемых скидок
      type: array
      items:
        type: object
        properties:
          type:
            description: |
              Тип маркетинговой акции:
              - `discount` - скидка
              - `bonus` - бонус
            type: string
          title:
            $ref: "#/components/schemas/Title"
          amount:
            type: number
            description: Сумма скидки
    Cart:
      type: array
      description: Массив номенклатур
      items:
        type: object
        properties:
          purchase:
            description: Структура номенклатуры
            type: object
            properties:
              id:
                $ref: "#/components/schemas/ID"
              title:
                $ref: "#/components/schemas/Title"
              type:
                description: |
                  Тип номенклатуры:
                  - service - Услуга
                  - product - Продукт
                  - package - Пакет услуг
                  - online_certificate - Подарочный онлайн-сертификат
                  - gift_certificate - Подарочный сертификат
                  - product_set - Набор услуг
                type: string
              validity:
                type: [object, "null"]
                description: Ограничение срока действия пакета услуг
                properties:
                  limitation_type:
                    type: string
                    description: |
                      Тип ограничения:
                      - "validity_limitation" - ограничение периодом действия (например, действует 1 месяц)
                      - "period_limitation" - ограничение по периоду (например, действует с 01.01.2020 по 01.06.2020)
                  validity_type:
                    type: string
                    description: |
                      Тип периода (Этот параметр возвращается только, если limitation_type = "validity_limitation")
                      - "day" - день
                      - "month" - месяц
                  count:
                    type: number
                    description: Количество периодов. Этот параметр возвращается только, если limitation_type = "validity_limitation"
                  start_date:
                    type: string
                    description: Дата начала действия пакета услуг. Возвращается только, если limitation_type = "period_limitation"
                  end_date:
                    type: string
                    description: Дата окончания действия пакета услуг. Возвращается только, если limitation_type = "period_limitation"
                  validity_description:
                    type: string
                    description: Описание срока действия (например, 2 мясяца и 3 дня)
              description:
                type: string
                description: Описание номенклатуры
              services:
                description: Массив включенных услуг (только для пакета услуг)
                type: [array, "null"]
                items:
                  type: object
                  properties:
                    id:
                      $ref: "#/components/schemas/ID"
                    title:
                      $ref: "#/components/schemas/Title"
                    count:
                      type: [number, "null"]
                      description: Количество услуг
              pictures:
                description: Массив ссылок на картинки номенклатуры
                type: array
                items:
                  type: string
          count:
            description: Количество номенклатуры
            type: number
          balance:
            description: Остаток услуг
            type: number
          balance_warning:
            description: Предупреждение об остатке
            type: string
          price:
            description: Цена
            type: number
          price_type:
            description: Вид цен
            $ref: "#/components/schemas/IDTitle"
          nds:
            description: |
              НДС:
              - 1	- Без НДС
              - 2	- НДС по ставке 0%
              - 3	- НДС по ставке 10%
              - 4	- НДС чека по ставке 20%
              - 5	- НДС чека по расчетной ставке 10/110
              - 6	- НДС чека по расчетной ставке 20/120
              - 7 - НДС чека по ставке 5%
              - 8 - НДС чека по ставке 7%
              - 9 - НДС чека по ставке 5/105
              - 10 - НДС чека по ставке 7/107
              - 11 - НДС чека по ставке 22%
              - 12 - НДС чека по ставке 22/122
            type: number
          nds_sum:
            description: Сумма НДС
            type: number
          price_with_discount:
            description: Сумма со скидкой
            type: number
          discount_sum:
            description: Сумма скидки
            type: number
          payment_amount:
            description: Сумма к оплате
            type: number
    Visit:
      type: object
      properties:
        id:
          description: Идентификатор визита
          $ref: "#/components/schemas/ID"
        status:
          description: |
