      parameters:
        - name: salon_id
          in: path
          description: Идентификатор салона.
          required: true
          schema:
            type: string

      requestBody:
        content:
          application/json:
            example:
              phone: "79876543210"
              method: outgoing_telegram
              request_id: 27dd2f8e-32a4-11ee-b18f-f02f7488d897
            schema:
              type: object
              required:
                - request_id
              properties:
                request_id:
                  type: string
                  example: 27dd2f8e-32a4-11ee-b18f-f02f7488d897
                  description: Идентификатор запроса.
                phone:
                  type: string
                  example: "79876543210"
                  description: "Номер телефона клиента. Должен передаваться в формате: 79876543210"
                method:
                  type: string
                  example: '"outgoing_telegram"'
                  description: Способ получения кода подтверждения.
