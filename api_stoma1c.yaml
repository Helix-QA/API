  /hs/api/v1/auth_types/{clinic_id}/:
    get:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  parameters:
                    description: Данные ответа
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          description: |
                            **Тип авторизации**:
                            - sms
                            - whats_app
                            - call
                            - outgoing_telegram
                            - outgoing_whatsapp
                            - outgoing_call
                        title:
                          type: string
                          description: Представление типа авторизации
                        method:
                          type: string
                          description: |
                            **Способ авторизации:**
                            - incoming - входящая
                            - outgoing - исходящая
                      required:
                        - type
                        - title
                        - method
                  errors:
                    $ref: "#/components/schemas/Errors"
              example:
                parameters:
                  - type: sms
                    title: СМС
                  - type: whats_app
                    title: WhatsApp
                  - type: email
                    title: Email
                errors:
                  code: 0
                  message: ""
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "401":
          description: Ошибка авторизации
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/AuthorizationError"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Получить доступные варианты авторизации {auth_types}
      operationId: auth_types
      description: |
        **Метод возвращает массив доступных вариантов авторизации**
        \
        Метод возвращает массив с информацией о доступных способах авторизации. Поля, включённые в массив, описывают методы и типы авторизации, которые клиент может использовать для подтверждения своей личности.

        ---
        **Поле `method` — Способ авторизации:**
        - **`incoming` (входящая)** -  Для авторизации используется код подтверждения, который отправляется на номер телефона клиента.
         Для подтверждения номера рекомендуется использовать метод: ["Авторизация"](#operation/auth)
        - **`outgoing` (исходящая)** - Для авторизации требуется исходящее действие от клиента, например, отправка сообщения в бот или звонок на указанный номер.
         Для подтверждения рекомендуется использовать метод: ["Запрос на подтверджения номера телефона"](#operation/auth_request)

        ---
        **Поле `type` - Типы доступных авторизаций:**
        - **`sms`** - Код подтверждения отправляется при помощи *sms* на указанный номер клиента. Относится с способу входящей авторизации (`incoming`)
        - **`whats_app`** - Код подтверждения отправляется в *WhatsApp* на указанный номер телефона клиента.  Относится с способу входящей авторизации (`incoming`)
        - **`call`** - Клиенту поступает звонок на указанный номер, после чего необходимо ввести последние цифры звонившего номера.  Относится с способу входящей авторизации (`incoming`)
        - **`outgoing_telegram`** - Для потверждения номера клиенту необходимо отправить сообщение в *telegram-bot*. Относится с способу исходящей авторизации (`outgoing`)
        - **`outgoing_whatsapp`** - Для потверждения номера клиенту необходимо отправить сообщение в *Whatsapp*. Относится с способу исходящей авторизации (`outgoing`)
        - **`outgoing_call`** - Для потверждения номера клиенту необходимо совершить звонок. Относится с способу исходящей авторизации (`outgoing`)

      tags:
        - authorization
      parameters:
        - name: clinic_id
          in: path
          description: ID клиники
          required: true
          example: 6d3f2e84-29a7-11ed-a261-0242ac120002
          schema:
            type: string
  /hs/api/v1/auth/{clinic_id}/:
    post:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      Parameters:
                        type: object
                        properties:
                          sent_SMS:
                            description: Код авторизации отправлен
                            type: boolean
                      Errors:
                        $ref: "#/components/schemas/Errors"
                  - type: object
                    properties:
                      Parameters:
                        type: object
                        properties:
                          UserToken:
                            description: Ключ клиента
                            type: string
                      Errors:
                        $ref: "#/components/schemas/Errors"
              examples:
                example1:
                  value:
                    Parameters:
                      sent_SMS: true
                    Errors:
                      code: 0
                      message: null
                example2:
                  value:
                    Parameters:
                      UserToken: 9323751AAB5A5925142F352BBA7913B3
                    Errors:
                      code: 0
                      message: null
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "401":
          description: Ошибка авторизации
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/AuthorizationError"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Авторизоваться {auth}
      operationId: auth
      description: |
        Авторизация клиента с использованием СМС-подтверждения или другого метода аутентификации <br>
        Процесс авторизации клиента осуществляется с применением СМС-подтверждения либо иного доступного метода аутентификации, который определяется параметром `auth_type`. В зависимости от указанного метода, система запрашивает подтверждение личности клиента через соответствующий канал связи. <br>
        1. **Формирование и отправка кода подтверждения** <br>
        В случае, если при вызове метода не передан код подтверждения, система автоматически сгенерирует новый одноразовый код. Этот код будет отправлен клиенту по СМС на номер телефона, указанный при регистрации или в текущей сессии или другой выбранный способ авторизации.

        2. **Проверка кода подтверждения**<br>
        Если клиент передает в метод действительный и правильный код подтверждения, система проверяет его корректность. В случае успешного совпадения предоставленного кода с сгенерированным, клиенту будет возвращён уникальный ключ авторизации — `UserToken`. <br> Этот ключ позволяет идентифицировать клиента и предоставляет доступ к защищённым ресурсам и функциям системы.

      tags:
        - authorization
      parameters:
        - name: clinic_id
          in: path
          description: ID клиники
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            example:
              login: "77731315"
              confirmation_code: "9876"
              name: Иванов Иван
            schema:
              type: object
              required:
                - login
              properties:
                login:
                  type: string
                  example: "79876543210"
                  description: "Номер телефона клиента. Должен передаваться в формате: 79876543210"
                confirmation_code:
                  type: string
                  example: "1234"
                  description: Код подтверждения
                name:
                  type: string
                  description: Имя клиента
                last_name:
                  type: string
                  description: Фамилия клиента
                second_name:
                  type: string
                  description: Отчество клиента
                birthday:
                  type: string
                  example: 31.12.1990
                  description: "Дата рождения в формате: 31.12.1990"
                email:
                  type: string
                  description: Электронная почта клиента
                auth_type:
                  type: string
                  description: Выбранный тип авторизации. По умолчанию тип авторизации - sms.
