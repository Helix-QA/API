          schema:
            type: string
        - name: record_array
          in: query
          description: >-
            Строка Json с массивом структур, содержащих параметры:
              - "datetime" - время записи: "20240831T1500"
              - "service_id" - ID номенклатуры
              - "staff_id" - ID сотрудника
            <br>Пример такой строки:<br>

            [{"datetime": "20240831T1500","service_id": "9ca0fa6c-48ee-11ea-96bc-38d547b31ac0","staff_id": "663290db-105c-41cc-97d4-ed5151065813"}]
          required: true
          schema:
            type: string
        - name: usertoken
          in: header
          description: Ключ клиента
          required: false
