          in: path
          description: ID клиники
          required: true
          schema:
            type: string
        - name: usertoken
          in: header
          description: Ключ шифрования (secret key из внешней системы)
          required: true
          schema:
            type: string
          example: YOUR_USER_TOKEN
      requestBody:
        content:
          application/json:
            example:
              clinic_id: 0d190fc8-1c01-11ef-b1bf-f02f7488d897
              id: 0d190fc8-1c01-11ef-b1bf-f02f7488d897
              staff_id: 0d190fc8-1c01-11ef-b1bf-f02f7488d897
              duration: 15
            schema:
              type: object
              properties:
                clinic_id:
                  type: string
                  description: ID клиники
                id:
                  type: string
                  description: ID пациента
                datetime:
                  type: string
                  description: Новое время записи
                staff_id:
                  type: string
                  description: ID врача
                comment:
                  type: string
                  description: Комментарий записи
                status:
                  type: string
                  description: >-
                    Статус записи: "not_confirmed" - Прием не подтвержден,
                    "waiting" - Пациент ожидает, "confirmed" - Прием
                    подтвержден, "started" - Прием начат, "not_happen" - Прием
                    не состоялся, "ended" - Прием окончен ,"canceled" - Прием
                    отменен
                duration:
                  type: number
                  description: Новая длительность
              required:
                - clinic_id
                - id

  /hs/api/v1/services/{clinic_id}/:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  Parameters:
                    type: array
                    description: Массив услуг
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: ID услуги
                        title:
                          type: string
                          description: Название услуги
                        price_min:
                          type: number
                          format: float
                          description: Минимальная цена услуги
                        price_max:
                          type: number
                          format: float
                          description: Максимальная цена услуги
                        weight:
                          type: integer
                          description: Вес для сортировки (чем меньше — тем выше в списке)
                        category_id:
                          $ref: "#/components/schemas/IDTitle"
                          description: Категория услуги
                        comment:
                          type: string
                          description: Комментарий к услуге (может быть пустым)
                        seance_length:
                          type: integer
                          description: Стандартная продолжительность сеанса в минутах
                        active:
                          type: boolean
                          description: Доступна ли услуга для записи
                        staff:
                          type: array
                          description: Массив сотрудников, которые могут оказывать эту услугу (может быть пустым при общем списке)
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                format: uuid
                                description: ID сотрудника
                              seance_length:
                                type: integer
                                description: Продолжительность сеанса у этого сотрудника (может отличаться от общей)
                            required:
                              - id
                      required:
                        - id
                        - title
                        - price_min
                        - price_max
                        - active
                        - seance_length
                  Errors:
                    type: object
                    description: Информация об ошибке
                    properties:
                      code:
                        type: integer
                        description: Код ошибки (0 — успех)
                      message:
                        type: string
                        description: Сообщение об ошибке или пустая строка при успехе
                    required:
                      - code
                      - message
                  Meta:
                    $ref: "#/components/schemas/Meta"
                required:
                  - Parameters
                  - Errors
                  - Meta
              example:
                Parameters:
                  - id: 6ad4c14f-1c03-11ef-b1bf-f02f7488d897
                    title: Услуга 2
                    price_min: 500
                    price_max: 500
                    weight: 0
                    category_id:
                      id: a19ee948-1c00-11ef-b1bf-f02f7488d897
                      title: Хирургия
                    comment: ""
                    seance_length: 60
                    active: true
                    staff:
                      - id: ef0fd170-3c83-465d-836b-51d72d208831
                        seance_length: 60
                Errors:
                  code: 0
                  message: Описание ошибки
                Meta:
                  items_count: 10
                  pages_count: 2
                  page_current: 1
                  page_size: 5
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "401":
          description: Ошибка авторизации
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/AuthorizationError"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Получить список услуг {services}
      operationId: services
      description: "Метод возвращает список услуг"
      tags:
        - services
      parameters:
        - name: clinic_id
          in: path
          description: ID клиники
          required: true
          example: 0d190fc8-1c01-11ef-b1bf-f02f7488d897
          schema:
            type: string
        - name: service_id
          in: query
          description: Фильтрация по ID услуги
          schema:
            type: string
        - name: staff_id
          in: query
          description: Фильтрация по ID врача
          schema:
            type: string
        - name: category_id
          in: query
          description: Фильтрация по ID категории
          schema:
            type: string
        - name: page
          in: query
          description: Номер страницы
          example: "1"
          schema:
            type: number
        - name: count
          in: query
          description: Количество элементов на странице
          example: "20"
          schema:
            type: number
        - name: usertoken
          in: header
          description: Ключ шифрования (secret key из внешней системы)
          required: true
          schema:
            type: string
          example: C1DB8500345E8B9C25E98330D0B3266B

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Использовать при отправке запросов напрямую в базу, т.е при отправке запросов по адресу http://cloud.stoma1c.ru/api/, авторизацию использовать не надо
    apiKey:
      type: apiKey
      in: header
      name: apikey
      description: "Ключ приложения. Указан во внешней системе (Example: **110132e6-ba129-4120-ac33-fcd612380121**)"
  schemas:
    BadRequest:
      description: Некорректный запрос
      type: object
      properties:
        Parameters:
          type: [object, "null"]
          description: Данные ответа
        Errors:
          $ref: "#/components/schemas/Errors"
      required:
        - Parameters

      example:
        Parameters: null
        Errors: { code: 1050, message: "Не найден объект" }
    AuthorizationError:
      description: Ошибка авторизации. Проверьте правильно ли переданы данные авторизации
      type: string
    InternalServerError:
      description: Внутренняя ошибка сервера
      type: object
      properties:
        Parameters:
          type: [object, "null"]
          description: Данные ответа
        Errors:
          $ref: "#/components/schemas/Errors"
      required:
        - Parameters
      example:
        Parameters: null
        Errors: { code: 1000, message: "Ошибка работы с базой данных." }
    Errors:
      description: Структура ошибки
      type: object
      properties:
        code:
          description: Код ошибки (см. Дополнительная информация)
          type: [number, "null"]
          example: 0
        message:
          description: Описание ошибки (см. Дополнительная информация)
          type: [string, "null"]
          example: "Описание ошибки"
    ID:
      description: "Идентификатор объекта"
      type: string
      format: uuid
      example: "689c34d8-79ee-11ec-b13e-f02f7488d897"
    Title:
      type: string
      example: "Наменование элемента"
      description: "Наименование"
    IDTitle:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ID"
        title:
          $ref: "#/components/schemas/Title"
      required:
        - id
        - title
    MayBePayment:
      type: array
      description: Массив структур возможных оплат (возвращается, если статус визита "TemporarilyReservedNeedPayment")
      items:
        type: object
        properties:
          id:
            description: Идентификатор лицевого/бонусного счета
            $ref: "#/components/schemas/ID"
          title:
            $ref: "#/components/schemas/Title"
          type:
            type: string
            description: |
              Тип счета:
              - `deposit` - лицевой
              - `bonus` - бонусный
          payment_amount:
            type: number
            description: Возможная сумма оплаты лицевым/бонусным счетом
    Promotions:
      description: Массив применяемых скидок
      type: array
      items:
        type: object
        properties:
          type:
            description: |
              Тип маркетинговой акции:
              - `discount` - скидка
              - `bonus` - бонус
            type: string
          title:
            $ref: "#/components/schemas/Title"
          amount:
            type: number
            description: Сумма скидки
    Cart:
      type: array
      description: Массив номенклатур
      items:
        type: object
        properties:
          purchase:
            description: Структура номенклатуры
            type: object
            properties:
              id:
                $ref: "#/components/schemas/ID"
              title:
                $ref: "#/components/schemas/Title"
              type:
                description: |
                  Тип номенклатуры:
                  - service - Услуга
                  - product - Продукт
                  - package - Пакет услуг
                  - online_certificate - Подарочный онлайн-сертификат
                  - gift_certificate - Подарочный сертификат
                  - product_set - Набор услуг
                type: string
              description:
                type: string
                description: Описание номенклатуры
          count:
            description: Количество номенклатуры
            type: number
          price:
            description: Цена
            type: number
          price_type:
            description: Вид цен
            $ref: "#/components/schemas/IDTitle"
          nds:
            description: |
              НДС:
              - 1	- Без НДС
              - 2	- НДС по ставке 0%
              - 3	- НДС по ставке 10%
              - 4	- НДС чека по ставке 20%
              - 5 - НДС чека по ставке 5%
              - 6 - НДС чека по ставке 7%
            type: number
          nds_sum:
            description: Сумма НДС
            type: number
          price_with_discount:
            description: Сумма со скидкой
            type: number
          discount_sum:
            description: Сумма скидки
            type: number
          payment_amount:
            description: Сумма к оплате
            type: number
    Record:
      type: object
      required:
        - datetime
        - service_id
      properties:
        datetime:
          type: string
          description: Дата в формате iso8601. Дата и время занятия
        service_id:
          type: string
          description: ID услуги
        staff_id:
          type: string
          description: ID сотрудника. Если не передан, то в прием подставится любой свободный сотрудник, способный оказать услугу
    Client:
      description: Данные клиента
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ID"
        clinic_id:
          description: Идентификатор салона
          $ref: "#/components/schemas/ID"
        name:
          description: Имя клиента
          $ref: "#/components/schemas/Title"
        surname:
          description: Фамилия клиента
          $ref: "#/components/schemas/Title"
        patronymic:
          description: Отчество клиента
          $ref: "#/components/schemas/Title"
        birth_date:
          description: Дата рождения клиента
          type: [string, "null"]
        phone:
          description: Номер телефона клиента
          type: string
        email:
          type: [string, "null"]
          description: Email клиента
        sold_amount:
          description: Сумма оплаченных услуг
          type: number
        visits_count:
          description: Количество посещений
          type: number
        sex:
          description: Пол клиента представление
          type: string
        sex_id:
          description: |
            Пол клиента:
            - 1 - мужской
            - 2 - женский
            - 0 - не известен
          type: number
        status:
          description: Статус представление
          type: string
        status_id:
          description: |
            Статус клиента:
            - 0 - Потенциальный
            - 1 - Новый
            - 2 - Невернувшийся
            - 3 - Постоянный
            - 4 - Отказ
          type: number
    Meta:
      description: Структура пагинации
      type: object
      properties:
        items_count:
          type: number
          example: 10
          description: Общее количество найденных записей
        pages_count:
          type: number
          example: 2
          description: Общее количество страниц
        page_current:
          type: number
          example: 1
          description: Текущая страница
        page_size:
          type: number
          example: 5
          description: Размер страницы
    Filter:
      type: object
      required:
        - type
        - value
      properties:
        type:
          type: string
          example: id
          description: Тип фильтра (`id`, `name`, `surname`, `patronymic`, `phone`, `email`)
        value:
          type: array
          items: {}
          description: Значение для фильтрации. Может быть как строкой, так и массивом строк
    Records:
      description: Данные визита
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ID"
        salon_id:
          description: Идентификатор салона
          $ref: "#/components/schemas/ID"
        start_date:
          description: Дата и время начала визита (ISO 8601)
          type: string
        end_date:
          description: Дата и время окончания визита (ISO 8601)
          type: string
        create_date:
          description: Дата создания записи (ISO 8601)
          type: string
        status:
          description: Статус записи (`waiting`, `started`, `not_happen`, `ended`, `canceled`)
          type: string
        comment:
          description: Комментарий визита
          type: string
        client:
          description: Клиент визита
          type: object
          properties:
            id:
              $ref: "#/components/schemas/ID"
            name:
              description: Имя клиента
              $ref: "#/components/schemas/Title"
            surname:
              description: Фамилия клиента
              $ref: "#/components/schemas/Title"
            patronymic:
              description: Отчество клиента
              $ref: "#/components/schemas/Title"
            display_name:
              description: Наименование клиента
              $ref: "#/components/schemas/Title"
            phone:
              description: Телефон клиента
              type: string
            email:
              description: Электронная почта клиента
              type: string
        staffs:
          description: Сотрудники визита
          type: array
          items:
            type: object
            properties:
              id:
                $ref: "#/components/schemas/ID"
              name:
                description: Имя сотрудника
                $ref: "#/components/schemas/Title"
              weight:
                description: Вес (приоритет)
                type: number
              information:
                type: string
                example: <img...>
                description: HTML-строка с эмоджи/описанием
              avatar:
                type: string
                example: "null"
                description: Аватар врача
              specialization:
                description: Специализация сотрудника
                $ref: "#/components/schemas/IDTitle"
        created_user:
          description: Структура автора визита
          $ref: "#/components/schemas/IDTitle"
        services:
          description: Услуги визита
          type: array
          items:
            type: object
            properties:
              id:
                $ref: "#/components/schemas/ID"
              title:
                $ref: "#/components/schemas/Title"
              cost:
                type: number
                description: Общая стоимость услуги
              amount:
                type: number
                description: Кол-во единиц
              cost_per_unit:
                type: number
                description: Цена за единицу
              first_cost:
                type: number
                description: Исходная цена
              discount:
                type: number
                description: Скидка в процентах

