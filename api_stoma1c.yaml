                      id: 98340848-0658-11e7-a757-001d7d5c01d0
                      title: Косметолог
                      code_oid: 100
                    weight: 0
                    information: ""
                    avatar: http://localhost/Spa3/hs/api/files/123456/24ed443d-9a02-11e7-8931-2c4d546557dd-94953.jpg
