      summary: Запрос на подтверджения номера телефона {auth_request}
      operationId: auth_request
      description: Осуществляется подтверждение номера телефона клиента.
        При вызове метода будет сформирован запрос на подтверждения номера телефона.
        Клиенту необходимо написать сообщение в мессенджер, либо позвонить по указанному номеру.
        В параметре __link__ возвращается ссылка по которой необходимо перейти и подтвердить номер.
        Атрибут __method__ определяет каким именно способом будет происходить подтверждение.
        Варианты авторизации получаются в методе [Методы авторизации](#operation/auth_methods")
        В ответе в `outgoing_id` в
        зависимости от переданого атрибута __method__ будет возвращаться номер телефона,
        либо идентификатор бота в telegtam
      tags:
        - Авторизация
      requestBody:
        content:
          application/json:
            example:
              phone: "79876543210"
              method: outgoing_telegram
              request_id: 27dd2f8e-32a4-11ee-b18f-f02f7488d897
            schema:
              type: object
              required:
                - phone
                - method
              properties:
                request_id:
                  type: string
                  example: 27dd2f8e-32a4-11ee-b18f-f02f7488d897
                  description: Идентификатор запроса.
                phone:
                  type: string
                  example: "79876543210"
                  description: Номер телефона клиента. Должен передаваться в формате _79876543210_
                method:
                  type: string
                  example: '"outgoing_telegram"'
                  description: >-
                    Способ получения кода подтверждения. см. метод
                    <a href="https://www.fitness1c.ru/api3/#tag/Avtorizaciya/operation/auth_methods">"Доступные способы исходящей авторизации"</a>
