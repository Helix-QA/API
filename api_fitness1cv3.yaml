components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    apiKey:
      type: apiKey
      in: header
      name: apikey
      description: "Ключ приложения (Example: **110132e6-ba129-4120-ac33-fcd612380121**)"
    userToken:
      type: apiKey
      in: header
      name: usertoken
      description: Ключ клиента
    tokenMaster:
      type: apiKey
      in: header
      name: token_master
      description: Ключ родственника
  schemas:
    Cart:
      type: array
      description: "Массив данных приобретаемых номекнлатур"
      items:
        type: object
        properties:
          purchase:
            description: "Структура номенклатуры"
            type: object
            properties:
              id:
                $ref: "#/components/schemas/ID"
              title:
                $ref: "#/components/schemas/Title"
              description:
