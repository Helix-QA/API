openapi: 3.1.0
info:
  x-logo:
    url: https://www.fitness1c.ru/local/templates/fitness.v2/images/logo_n.svg
  title: API 1С:Фитнес клуб 4.0 V3
  version: 1.0.0
  description: |-
    Документация API для 1С:Fitness, редакция 4.0 v3

    Для получения данных во всех методах используйте Basic авторизацию (Логин и пароль пользователя 1С)

    **usertoken** - Токен клиента

    **token-master** - Токен родителя, используемый при оплате с аккаунта родителя за ребенка.
servers:
  - url: https://app.1c.fitness/fitnessapi
security:
  - basicAuth: []
    apiKey: []
paths:
  /hs/api/v3/auth_types:
    get:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: "#/components/schemas/ResultResponse"
                  data:
                    type: object
                    description: Данные запроса
                    properties:
                      auth_types:
                        type: array
                        items:
                          type: object
                          properties:
                            title:
                              type: string
                              description: Представление типа авторизации
                            type:
                              type: string
                              description: |
                                Тип авторизации
                                - Смс
                                - whats_app
                                - Звонок
                                - Max
                          required:
                            - title
                            - type
              example:
                result: true
                data:
                  auth_types:
                    - type: sms
                      title: SMS
                    - type: whats_app
                      title: WhatsApp
                    - type: call
                      title: Звонок
                    - type: Max
                      title: Max
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Доступные варианты авторизации {auth_types}
      operationId: auth_types
      description: "Метод возвращает массив структур с доступными вариантами авторизации."
      tags:
        - Авторизация
      parameters: []
  /hs/api/v3/confirm_phone:
    post:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    title: Запрос авторизации
                    properties:
                      result:
                        $ref: "#/components/schemas/ResultResponse"
                      data:
                        type: object
                        description: Данные запроса
                        properties:
                          auth_type:
                            type: string
                            description: |
                              Тип подтверждения номера:
                              - при помощи sms
                              - при помощи звонка
                              - при помощи мессенджера
                              - при помощи max
                  - type: object
                    title: Подтверждение авторизации
                    properties:
                      result:
                        $ref: "#/components/schemas/ResultResponse"
                      data:
                        type: object
                        description: Данные запроса
                        properties:
                          pass_token:
                            description: Одноразовый токен для установки пароля
                            type: string
              examples:
                example1:
                  value:
                    result: true
                    data:
                      auth_type: sms
                example2:
                  value:
                    result: true
                    data:
                      pass_token: 580392e6-ba49-4280-ac67-fcd6f2180121
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Подтверждение номера телефона {confirm_phone}
      operationId: confirm_phone
      description: >-
        Осуществляется подтверждение номера телефона клиента.

        При вызове метода без передачи `confirmation_code` будет сформирован и отправлен новый код подтверждения, либо произведен звонок на указанный номер (зависит от настроек внешней системы).

        При передаче атрибута `auth_type` подтверждение будет выполняться переданным способом.
        Варианты авторизации получаются в методе [Доступные варианты авторизации {auth_types}](#operation/auth_types).

        Если передать в метод верный код подтверждения, будет возвращён ключ для установки пароля `pass_token`.
        **apikey и usertoken передается в HEADERS**.
      tags:
        - Авторизация
      requestBody:
        content:
          application/json:
            examples:
              example1:
                value:
                  phone: "79876543210"
                  auth_type: sms
              example2:
                value:
                  phone: "79876543210"
                  confirmation_code: "9876"
            schema:
              type: object
              required:
                - phone
              properties:
                phone:
                  type: string
                  example: "79876543210"
                  description: Номер телефона клиента. Должен передаваться в формате  **79876543210**
                confirmation_code:
                  type: string
                  example: "2438"
                  description: Код подтверждения
                auth_type:
                  type: string
                  example: sms
                  description: >-
                    Способ получения кода подтверждения. см. метод [Доступные варианты авторизации {auth_types}](#operation/auth_types)
                recovery:
                  type: boolean
                  example: false
                  description: >-
                    При передаче параметра, определяющего статус восстановления
                    пароля, будет выполнена проверка на наличие клиента в базе
                    данных
  /hs/api/v3/password:
    post:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: "#/components/schemas/ResultResponse"
                  data:
                    type: object
                    description: Данные запроса
                    properties:
                      new_client:
                        type: boolean
                        description: |
                          Признак нового клиента
                          - true
                          - false
                      user_token:
                        type: string
                        description: Временный ключ клиента
                      id:
                        type: string
                        description: Идентификатор клиента
                      client:
                        type: object
                        description: Структура данных клиента
                        properties:
                          id:
                            $ref: "#/components/schemas/ID"
                          last_name:
                            type: string
                            description: Фамилия клиента
                          name:
                            type: string
                            description: Имя клиента
                          second_name:
                            type: string
                            description: Отчество клиента
                          email:
                            type: string
                            description: Адрес электронной почты клиента
                          phone:
                            type: string
                            description: Номер телефона клиента
                          birthday:
                            type: string
                            description: Дата рождения клиента
                          sex:
                            type: number
                            description: |
                              Пол клиента:
                              - 1 - мужской
                              - 2 - женский
                              - 0 - null
                          club:
                            type: object
                            description: Информация о структурной единице
                            properties:
                              id:
                                $ref: "#/components/schemas/ID"
                              name:
                                type: string
                                description: Наименование структурной единицы
                          cards:
                            type: array
                            description: Массив с картами клиента
                            items:
                              type: object
                              properties:
                                id:
                                  $ref: "#/components/schemas/ID"
                                title:
                                  $ref: "#/components/schemas/Title"
                                card_code:
                                  type: string
                                  description: Код карты
                                card_type:
                                  type: string
                                  description: |
                                    Тип карты:
                                    - magnetic
                                    - barcode
                                    - electronic
                                link:
                                  type: string
                                  description: Ссылка на установку карты
                          promocodes:
                            type: array
                            description: Массив с реферальными промокодами клиента
                            items:
                              type: object
                              properties:
                                title:
                                  type: string
                                  description: Заголовок промокода
                                promocode:
                                  type: string
                                  description: Промокод
                          tags:
                            type: array
                            items: {}
              example:
                result: true
                data:
                  new_client: false
                  user_token: DA4A8A96D18BB3CE8E93490EF23EFBD9
                  id: f2adaa8f-6cb4-11ed-b167-f02f7488d897
                  client:
                    id: f2adaa8f-6cb4-11ed-b167-f02f7488d897
                    last_name: Орлов
                    name: Тест
                    second_name: Александрович
                    email: 5@mail.ru
                    phone: +7 (9876) 543210
                    birthday: ""
                    sex: 1
                    club:
                      id: 849235b6-2bf5-11ec-910f-2c4d546557dd
                      name: ООО "Fitness"
                    cards:
                      - id: ec641f2f-d2f0-11ed-b17d-f02f7488d897
                        title: Карта №00000147
                        card_code: "00000147"
                        card_type: electronic
                        link: "{Ссылка}"
                    promocodes:
                      - title: Реферальный
                        promocode: KP335
                    tags: []
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Установка пароля {password}
      operationId: password
      description: Метод выполняет установку пароля при предоставлении
        верного токена смены пароля `pass_token`. В случае
        отсутствия клиента в базе 1С по номеру телефона, `user_token`
        и `client` не возвращаются.
        Атрибут pass_token получается в при помощи методов [Подтверждение номера телефона {confirm_phone}](#operation/confirm_phone),
        либо  [Токен установки пароля {pass_token}](#operation/pass_token)
      tags:
        - Авторизация

      requestBody:
        content:
          application/json:
            example:
              phone: "79876543210"
              password: qwerty123
              pass_token: DA4A8A96D18BB3CE8E93490EF23EFBD9
            schema:
              type: object
              required:
                - phone
                - password
                - pass_token
              properties:
                phone:
                  type: string
                  example: "79876543210"
                  description: Номер телефона клиента. Должен передаваться в формате  _79876543210_
                password:
                  type: string
                  example: qwerty123
                  description: Пароль клиента, привязанный к номеру телефона
                pass_token:
                  type: string
                  example: 580392e6ba494280ac67fcd6f2180121
                  description: Токен для смены пароля
  /hs/api/v3/auth_client/:
    post:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: "#/components/schemas/ResultResponse"
                  data:
                    type: object
                    description: Данные запроса
                    properties:
                      user_token:
                        type: string
                        description: Временный ключ клиента
                      id:
                        $ref: "#/components/schemas/ID"
              example:
                result: true
                data:
                  user_token: 580392e6-ba49-4280-ac67-fcd6f2180121
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Авторизация {auth_client}
      operationId: auth_client
      description:
        "Метод предназначен для авторизации клиента по номеру телефона и паролю,
        взамен клиент получает временный ключ `user_token` для инициализация клиента
        во время произведения операций."
      tags:
        - Авторизация
      requestBody:
        content:
          application/json:
            example:
              phone: "79876543210"
              password: qwerty123
            schema:
              type: object
              required:
                - phone
                - password
              properties:
                phone:
                  type: string
                  example: "79876543210"
                  description: >-
                    Номер телефона клиента. Номер телефона должен передаваться в
                    формате  _79876543210_
                password:
                  type: string
                  example: qwerty123
                  description: Пароль клиента, привязанный к номеру телефона
  /hs/api/v3/reg_and_auth_client/:
    post:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: "#/components/schemas/ResultResponse"
                  data:
                    type: object
                    description: Данные запроса
                    properties:
                      user_token:
                        type: string
                        description: Ключ клиента
                      id:
                        $ref: "#/components/schemas/ID"
              example:
                result: true
                data:
                  user_token: 580392e6-ba49-4280-ac67-fcd6f2180121
                  id: 27dd2f8e-32a4-11ee-b18f-f02f7488d897
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Регистрация и авторизация {reg_and_auth_client}
      operationId: reg_and_auth_client
      description:
        Метод предназначен для авторизации клиента по номеру телефона и паролю,
        взамен клиент получает ключ `user_token` для инициализация клиента во время
        произведения операций. Если клиент с переданным номером не найден в базе 1С,
        будет создан новый клиент.
      tags:
        - Авторизация
      requestBody:
        content:
          application/json:
            example:
              phone: "79876543210"
              pass_token: B52450CCE60E41DA084CAB228329851A
              password: qwerty123
              last_name: Петров
              name: Петр
              second_name: Петрович
              email: petrov@mail.ru
              birthday: "2000-01-16"
              marketing:
                utm_source: 7e54g5d1bgdfh512esasf
                utm_medium: se54g5d1bgdfh541esasf
                utm_campaign: sdeg54se65g4s65safaf
              id_cards:
                - document_type: passport
                  series: "11111"
                  number: "11111"
                  date: "2019-10-24"
                  code: "111111"
                  issued_by: Выдано ...
              cars:
                - number: C 123 MC
                - brand: BMW
            schema:
              type: object
              required:
                - phone
                - pass_token
              properties:
                phone:
                  type: string
                  example: "79876543210"
                  description: >-
                    Номер телефона клиента. Номер телефона должен передаваться в
                    формате  _79876543210_
                pass_token:
                  type: string
                  example: B52450CCE60E41DA084CAB228329851A
                  description: Токен доступа
                autopassword_to_sms:
                  type: boolean
                  description: >-
                    Генерировать пароль и возвращать его по смс. Если истина, то
                    `password` передавать не надо
                password:
                  type: string
                  example: qwerty123
                  description: Пароль клиента, привязаный к номеру телефона
                last_name:
                  type: string
                  example: Петров
                  description: Фамилия
                name:
                  type: string
                  example: Петр
                  description: Имя
                second_name:
                  type: string
                  example: Петрович
                  description: Отчество
                email:
                  type: string
                  example: petrov@mail.ru
                  description: Адрес электронной почты
                photo:
                  type: string
                  description: Фото клиента (Закодированная строка base64)
                birthday:
                  type: string
                  example: 05-07-2023
                  description: Дата рождения
                club:
                  type: string
                  example: cd7a029f-c7c6-11ed-bc31-00305683c4cb
                  description: Идентификатор клуба
                marketing:
                  $ref: "#/components/schemas/marketing"
                  description: Структура параметров utm-меток
                id_cards:
                  $ref: "#/components/schemas/IDCards"
                  description: Структура удостоверений личности
                card:
                  $ref: "#/components/schemas/Cars"
                  description: Структура автомобилей клиента
  /hs/api/v3/agreement/:
    get:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            text/html:
              example: |
                {

                }
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Согласие на обработку персональных данных {agreement}
      operationId: agreement
      description: Метод возвращает html код, содержащий форму согласия на обработку персональных данных.
      tags:
        - Авторизация
  /hs/api/v3/public_offer/:
    get:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            text/html:
              example: |
                {

                }
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Публичная оферта {public_offer}
      operationId: public_offer
      description: Метод возвращает html код, содержащий форму публичной оферты.
      tags:
        - Авторизация
  /hs/api/v3/privacy_policy/:
    get:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            text/html:
              example: |
                {

                }
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Политика конфиденциальности {privacy_policy}
      operationId: privacy_policy
      description: Метод возвращает html код, содержащий форму описание политиики конфиденциальности.
      tags:
