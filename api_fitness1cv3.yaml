  /hs/api/v3/site_rules/:
    get:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            text/html:
              example: |
                {

                }
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Правила сайта {site_rules}
      operationId: site_rules
      description: Метод возвращает html код, содержащий форму описание правил.
      tags:
        - Авторизация
  /hs/api/v3/receive_promotional_messages/:
    get:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            text/html:
              example: |
                {

                }
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Согласие на получение сообщений рекламного характера {receive_promotional_messages}
      operationId: receive_promotional_messages
      description:
        Метод возвращает html код, содержащий форму с описанием соглашения
        на получение сообщений рекламного характера.
      tags:
        - Авторизация
  /hs/api/v3/pass_token/:
    get:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: "#/components/schemas/ResultResponse"
                  data:
                    type: object
                    description: Данные запроса
                    properties:
                      pass_token:
                        type: string
                        description: Токен смены пароля
              example:
                result: true
                data:
                  pass_token: 87FB201B05B442694EF384C2459836D8
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Токен установки пароля {pass_token}
      operationId: pass_token
      description: |
        Метод возвращает токен для установки или смены пароля.Цифровая подпись
        `sign` представляет собой хеш, полученный при помощи алгоритма хеширования SHA256.
        Цифровая подпись состоит из переданных данных и имеет вид:
        "phone: 79876543210; key: IjRjlaL",
        где:
        - phone - номер телефона,
        - key - секретный ключ из настроек внешней системы.
      tags:
        - Авторизация
      parameters:
        - name: phone
          in: query
          description: Номер телефона клиента. Должен передаваться в формате
          required: true
          example: "79876543210"
