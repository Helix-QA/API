                      sum:
                        type: number
                        description: Сумма визита (возвращается, если статус визита "temporarily_reserved_need_payment")
              example:
                Parameters:
                  Result: true
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Запись на визит {book_record}
      operationId: book_record
      description: |
        Осуществляет запись на услугу клиента на указанное время к выбранному сотруднику.
         Клиент определяется по ключу клиента (UserToken), получаемому при авторизации и передаваемому в заголовке запроса.
         При первом вызове создается запись и возвращается идентификатор записи.Статусы визита:
         - "reserved" - визит зарезервирован
         - "temporarily_reserved_need_payment" - визит зарезервирован, временно забронирован
         (если в течении 5 минут не будет произведена оплата, то визит будет автоматически отменен) и требуется предоплата
         - "reserved_and_payed" - визит зарезервирован и оплачен
      tags:
        - Запись в салон красоты
      parameters:
        - name: usertoken
          in: header
          description: Ключ клиента
          required: false
          schema:
            type: string
          example: 2A3B4CCBA20D3920907B45733E356770
      requestBody:
        content:
          application/json:
            example:
              Parameters:
                Result: true
                record_id: d4608b12-5a07-11e9-899e-2c4d546557dd
                status: TemporarilyReservedNeedPayment
                sum: 2300
            schema:
              type: object
              required:
                - club_id
              properties:
                club_id:
                  type: string
                  description: Идентификатор структурной единицы.
                record_array:
                  $ref: "#/components/schemas/Record"
                  description: >-
                    Массив записей. Является обязательным, если не передан
                    идентификатор визита.
                fullname:
                  type: string
                  description: Фамилия, имя, отчество клиента, разделенные пробелами
                birthday:
                  type: string
                  description: 'Дата рождения в формате: "31.12.1990".'
                email:
                  type: string
                  description: Адрес электронной почты клиента
                comment:
                  type: string
                  description: Комментарий к визиту
                commercial:
                  type: string
                  description: Рекламный источник
                record_id:
                  type: string
                  description: >-
                    Идентификатор занятия. Если передан, то остальные параметры
                    передавать не нужно
