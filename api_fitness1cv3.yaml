                    seance_length: 30
                    datetime: "2017-08-24T10:00:00"
                  - time: "15:00"
                    seance_length: 30
                    datetime: "2017-08-24T15:00:00"
                  - time: "17:00"
                    seance_length: 30
                    datetime: "2017-08-24T17:00:00"
                  - time: "17:30"
                    seance_length: 30
                    datetime: "2017-08-24T17:30:00"
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
