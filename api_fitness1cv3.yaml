      summary: Создать ссылку на оплату {payment_link}
      operationId: payment_link
      description: |
        Метод создает и возвращает ссылку для оплаты клиентом. Метод работает для пополнения лицевого счета, покупок и оплат задолженностей. Возвращается флаг успешности оплаты 'Result' типа bool.
        - Для создания покупки необходимо передать параметры: club_id, transaction_id, payment_info, payment_list, cart, lead_id, promocode.
        - Для создания ссылка на оплату интервалов аренды необходимо передавать параметры:  club_id, transaction_id, payment_info, payment_list, cart_rental, lead_id, promocode.
        - Для пополнения лицевого счета необходимо передавать: club_id, transaction_id, deposit_id, cost.
        - Для оплаты задолженностей неободимо передавать: club_id, transaction_id, sales, payment_list.

      tags:
        - Оплаты
      parameters:
        - name: usertoken
          in: header
          description: Ключ клиента
          required: false
          schema:
            type: string
          example: 7e8245d1-574f-4ce8-88ec-7e34358df45
        - name: token-master
          in: header
          description: Ключ родителя
          required: false
          schema:
            type: string
          example: a62afb1e-97b2-11e7-b142-0050568b93ed
