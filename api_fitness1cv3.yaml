              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Получить список слотов доступных для записи {book_times}
      operationId: book_times
      description: |
        Возвращается массив доступных для записи слотов с указанного времени до конца дня.
        Для получения списка слотов, в которые определённый сотрудник может оказывать определённую услугу,
        необходимо использовать отборы по сотруднику и/или услуге:
        - `service_id`: Идентификатор услуги. Будут выведены слоты, в которые можно записаться на выбранную услугу
        - `staff_id`: Идентификатор сотрудника. Будут выведены даты, в которые можно записаться на выбранного сотрудника
        - `datetime`: Дата (в формате iso8601). Будут выведены слоты для записи в указанный день после установленного времени.
        Если параметры отбора не указаны, то будут выведены все свободные слоты по всем сотрудникам с текущей даты сеанса и до конца дня.
      tags:
        - Запись в салон красоты
      parameters:
        - name: club_id
          in: query
          description: Идентификатор клуба
          required: true
          schema:
            type: string
        - name: service_id
          in: query
          description: Идентификатор услуги
          schema:
            type: string
        - name: staff_id
          in: query
          description: Идентификатор сотрудника
          schema:
            type: string
        - name: datetime
          in: query
          description: >-
            Дата в формате iso8601. Если параметр не заполнен, используется
            текущая дата сеанса
          example: 20170824T0900
          schema:
            type: string
        - name: service_ids
          in: query
          description: >
            Строка Json с массивом идентификаторов услуг, которые нужно оказать
            одновременно.

            Пример строки:

            {"services_array":["140df5b4-5a58-11e7-82e7-0050568b5c8d","d8329477-5a5a-11e7-82e7-0050568b5c8d"]}
          schema:
            type: string
