      summary: Оплатить покупки {payment}
      operationId: payment
      description: |
        Метод создаёт документ продажи и документ оплаты.Атрибут `use_bank` используется в случаях,
         когда во внешней системе для одного клуба подключены два эквайринговых терминала,
         принадлежащих одной и той же организации, но работающих через разные платёжные шлюзы
         Возможные варианты:
         - sber - Сбербанк
         - paymo - Paymo
         - alfa - АльфаБанк
         - tinkoff - Тинькофф
         - bepaid - BePaid
         - cloudpayments - CloudPayments
         - paykeeper - PayKeeper
         - yookassa - ЮКасса
         - stripe - Stripe
         - yandex_pay - Яндекс Pay
         - paygine - Paygine
         - sbp - СБП
      tags:
        - Оплаты
      parameters:
        - name: usertoken
          in: header
          description: Ключ клиента
          required: false
          schema:
            type: string
          example: 7e8245d1-574f-4ce8-88ec-7e34358df45
        - name: token-master
          in: header
          description: Ключ родителя
          required: false
          schema:
            type: string
          example: a62afb1e-97b2-11e7-b142-0050568b93ed
      requestBody:
        content:
          application/json:
            example:
              transaction_id: 1211
              cart:
                - purchase_id: a62afb1e-97b2-11e7-b142-0050568b93ed
                  count: 1
              payment_list:
                - type: cash
                  amount: 11000
                - type: card
                  id: ea18da46-98cf-11e9-89a3-2c4d546557dd
                  amount: 8000
                - type: deposit
                  id: ea18da46-98cf-11e9-89a3-2c4d546557dd
                  amount: 2000
            schema:
              type: object
              required:
                - transaction_id
                - cart
                - payment_list
                - club_id
              properties:
                transaction_id:
                  type: string
                  description: Идентификатор транзакции
                cart:
                  $ref: "#/components/schemas/cart"
                  description: Массив структур оплачиваемых номенклатур
                payment_list:
                  $ref: "#/components/schemas/PaymentList"
                  description: Массив структур оплат
                club_id:
                  type: string
                  description: Идентификатор структурной единицы
                org_id:
                  type: string
                  description: Идентификатор организации
                lead_id:
                  type: string
                  description: Идентификатор лида
                promocode:
                  type: string
                  description: Промокод
                payment_info:
                  $ref: "#/components/schemas/paymentInfo"
                  description: Структура дополнительной информации
                use_bank:
                  type: string
                  description: Используемый сервис оплаты
                create_date:
                  type: string
                  example: "2022-10-31T16:39:51"
                  description: Дата создания платежа
