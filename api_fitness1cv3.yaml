                - brand
                - first_1
                - last_4
              properties:
                token:
                  type: string
                  description: Токен привязки карты, полученный в банке
                exp_month:
                  type: number
                  description: >-
                    Месяц окончания срока действия карты, представленный двумя
                    цифрами
                exp_year:
                  type: number
                  description: >-
                    Год срока окончания действия карты, представленный четырьмя
                    цифрами
                holder:
                  type: string
                  description: Имя владельца карты
                brand:
                  type: string
                  description: "Определенный бренд карты: visa, master"
                first_1:
                  type: string
                  description: Первая цифра карты
                last_4:
                  type: string
                  description: Последние 4 цифры карты
