      summary: Получить стоимость корзины {cart_cost}
      operationId: cart_cost
      description: Метод возвращает массив цен номенклатур.
      tags:
        - Оплаты
      parameters:
        - name: cart
          in: query
          description: |
            Строка Json с массивом структур, содержащих параметры:
              - `purchase_id` (идентификатор номенклатуры)
              - `count` (количество номенклатур)
              - `price_type_id` (идентификатор вида цен, который можно получить из метода "employee_choice", если не указан, то вид цен будет браться из настроек внешней системы)
              - `employee_id` (идентификатор сотрудника для получения вида цен сотрудника)
              - `start_date` (дата время начала записи)
              - `activation_date` (дата активации ЧПУ, передавать в виде: "2024-10-02")
              - `ticket_id` (идентификатор членств/пакетов услуг, передается при покупке модификаторов)
              - `service_id` (идентификатор услуги, передается при покупке основания для записи в занятие)
              - `cart_pay` (структура с передаваемыми оплатами, если не указан, в структура возврата не будет структуры "cart_pay")
              - `activation_date` (дата активации пакета услуг)

            Пример такой строки:
            {"cart_array":[{"purchase_id":"9ad49672-a043-11e7-ab37-000c2938171c","count":2, "price_type_id":"11149672-a043-11e7-ab37-000c2938171c"},{"purchase_id":"8bac3895-9e13-11e7-9966-0050568bd50c","count":1, "price_type_id":"33359672-a043-11e7-ab37-000c2938171c"}]}

          required: true
          schema:
            type: string
        - name: club_id
          in: query
          description: Идентификатор структурной единицы
          required: true
          schema:
            type: string
        - name: promocode
          in: query
          description: Промокод
          schema:
            type: string
        - name: lead_id
          in: query
          description: Идентификатор заявки для быстрой покупки
          schema:
            type: string
        - name: certificate
          in: query
          description: Серия сертификата
          schema:
            type: string
        - name: usertoken
          in: header
          description: Ключ клиента
          required: false
          schema:
            type: string
          example: 7e8245d1-574f-4ce8-88ec-7e34358df45
