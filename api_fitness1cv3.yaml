                value:
                  transaction_id: 1211
                  cart:
                    - purchase_id: a62afb1e-97b2-11e7-b142-0050568b93ed
                      count: 1
                  payment_list:
                    - type: cash
                      amount: 11000
                    - type: card
                      amount: 8000
                    - type: deposit
                      id: ea18da46-98cf-11e9-89a3-2c4d546557dd
                      amount: 2000
                  club_id: 849235b6-2bf5-11ec-910f-2c4d546557dd
              example2:
                value:
                  transaction_id: 1211
                  cart_rental:
                    - purchase_id: a62afb1e-97b2-11e7-b142-0050568b93ed
                      count: 1
                  payment_list:
                    - type: cash
                      amount: 11000
                    - type: card
                      amount: 8000
                    - type: deposit
                      deposit_id: ea18da46-98cf-11e9-89a3-2c4d546557dd
                      amount: 2000
              example3:
