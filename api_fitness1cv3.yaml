tags:
  - name: Авторизация
    description: Список методов предназначенных для авторизации клиентов.
  - name: Клиенты
    description: >-
      Методы предназначены для работы с клиентскими данными. Доступ к методам
      осуществляется по средством ключа клиента `user_token`.
  - name: Лиды
  - name: Членства, пакеты услуг, разовые услуги
  - name: Лицевые и бонусные счета клиента
  - name: Временные брони
  - name: Персональные занятия
  - name: Групповые занятия
  - name: Направления
  - name: Лист ожидания
  - name: Аренда зала
  - name: Посещения
  - name: Запись в салон красоты
  - name: Каталог
  - name: Оплаты
  - name: Сотрудники
  - name: Помещения
  - name: Секции
  - name: Клубы
  - name: Достижения
  - name: Прочее
  - name: Дополнительная информация
    description: |-
      ## Коды ошибок 1C


      | Код   | Описание                                                                                                           |
      |-------|--------------------------------------------------------------------------------------------------------------------|
      | 1010  | Клиент(ы) не найден(ы)                                                                                             |
      | 1011  | Не найден лицевой счет                                                                                             |
      | 1012  | Не найдено занятие                                                                                                 |
      | 1013  | Состав занятия не заполнен                                                                                         |
      | 1014  | Не найдено членство, пакет услуг, разовая услуга                                                                   |
      | 1015  | Ошибка отмены заморозки, членство не заморожено                                                                    |
