                value:
                  club_id: 849235b6-2bf5-11ec-910f-2c4d546557dd
                  deposit_id: 05f5afff-e166-11e6-b16f-3085a98f71a0
                  transaction_id: "789654121"
                  cost: 2000
            schema:
              type: object
              required:
                - club_id
                - transaction_id
                - payment_list
              properties:
                club_id:
                  type: string
                  description: Идентификатор структурной единицы
                transaction_id:
                  type: string
                  description: Идентификатор транзакции
                payment_info:
                  $ref: "#/components/schemas/paymentInfo"
                  description: Структура дополнительной информации
                payment_list:
                  $ref: "#/components/schemas/PaymentList"
                  description: Массив структур оплат
                cart:
                  $ref: "#/components/schemas/cart"
                  description: Массив структур оплачиваемых номенклатур
                cart_rental:
                  $ref: "#/components/schemas/CartRental"
                  description: Массив структур оплачиваемых номенклатур аренды
                lead_id:
                  type: string
                  description: Идентификатор лида
                promocode:
                  type: string
                  description: Промокод
                cost:
                  type: string
                  description: Сумма пополнения (число с плавающей точкой(float))
                deposit_id:
                  type: string
                  description: (required, string)
                sales:
                  type: string
                  description: Массив идентификаторов реализаций
