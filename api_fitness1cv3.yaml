          type: object
          description: Данные посещения клиетнта. Null - если клиент не находится в клубе
          properties:
            time:
              type: number
              description: Время нахождения в клубе в секундах
        user_token:
          type: string
          description: Измененный ключ клиента, возвращается только в методе PUT

    RecurrentDetails:
      type: [object, "null"]
      description: Структура с данными о следующем платеже рекуррентного членства
      properties:
        id:
          type: string
          description: Идентфикатор рекуррентного договора
        status:
          type: string
          description: |
            Статус рекуррентного договора:
            - "opened" - Открытый
            - "closed" - Закрытый
            - "pre_sale" - Предпродажа, будет активирован в момент открытия клуба
            - "not_active" - Договор будет активирован после активации членства
        payment_date:
          type: string
          description: Дата следующего платежа (yyyy-mm-dd). Если договор закрыт вернет null
        payment_amount:
          type: number
          description: Сумма следующего платежа. Если договор закрыт вернет null

    TicketObject:
      type: object
      description: Данные членства (пакета услуг)
      properties:
        title:
          $ref: "#/components/schemas/Title"
          description: Наименование членства, пакета услуг
        ticket_id:
          $ref: "#/components/schemas/ID"
          description: Идентификатор членства, пакета услуг
        item_id:
          $ref: "#/components/schemas/ID"
          description: Идентификатор номенклатуры членства
        count:
          type: string
          description: Количество услуг
        type:
          type: string
          description: |
            Тип:
            - "membership" - членство
            - "package" - Пакет услуг
        status:
          type: string
          description: |
            Статус:
            - "active" - Активно
            - "not_active" - Не активно
            - "frozen" - Заморожено
            - "locked" - Заблокировано
            - "closed" - Закрыто"
        active_date:
          type: string
          description: Дата первой активации
        end_date:
          type: string
          description: Дата окончания срока действия членства, пакета услуг
        start_status_date:
          type: string
          description: Дата установки текущего статуса
        end_status_date:
          type: string
          description: Дата окончания текущего статуса
        total_frozen:
          type: string
          description: Общее количество заморозок
        balance_frozen:
          type: string
          description: Остаток количества заморозок
        min_frozen_count:
          type: string
          description: Минимальное количество дней заморозки
        total_guest_visit:
          type: string
          description: Общее количество гостевых посещений
        balance_guest_visit:
          type: string
          description: Остаток количества гостевых посещений
        type_activation:
          type: array
          description: Структура с типом активации ЧПУ
          items:
            type: object
            properties:
              title:
                type: string
                description: Наименование типа активации
              type:
                type: string
                description: |
                  Тип активации:
                  - when_sell - определяется при продаже
                  - when_paying - при оплате
                  - when_visiting - при первом посещении
                  - at_sale - в момент продажи

        service_list:
          type: array
          description: Массив услуг членства, пакета услуг
          items:
            type: object
            properties:
              title:
                type: string
                description: Наиемнование услуги, сегмента услуг
              service_id:
                type: string
                description: Идентификатор услуги, сегмента услуг
              type_service:
                type: string
                description: |
                  Тип услуги:
                  - "rent" - Аренда
                  - "group" - Групповое занятие
                  - "personal" - Персональное занятие
                  - "salon" - Услуга салона
                  - "other" - Прочие услуги
              type:
                type: string
                description: |
                  Тип:
                  - segment - сегмент
                  - service - услуга
              count:
                type: string
                description: Остаток количества услуг
              count_reserves:
                type: string
                description: Количество зарезервированных занятий
            required:
              - title
              - ticket_id
              - type
              - status
              - end_date
              - status_date
              - count
        аvialable_аctions:
          type: array
          description: |
            Массив возможных операций над ЧПУ. Возвращается только для членств и пакетов услуг.
            - reezing - Заморозка
            - cancel_freezing - Отмена заморозки
            - defreezing - Разморозка
            - guest_visits - Добавление гостевых визитов
            - adding_visits - Добавление посещений
            - validity - Добавление срока действия
            - freeze_period - Добавление срока заморозки
            - cancel_subscription - Отмена подписки рекуррентного договора
        available_clubs:
          type: array
          description: Массив структур клубов
          items:
            type: object
            properties:
              id:
                type: string
                description: Идентификатор клуба
              title:
                type: string
                description: Наименование клуба
        freeze_list:
          type: array
          description: Массив структур заморозок
          items:
            type: object
            properties:
              id:
                type: string
                description: Идентификатор документа заморозки
              start_date:
                type: string
                description: Время начала заморозки
              end_date:
                type: string
                description: Время окончания заморозки
              count:
                type: number
                description: Количество дней заморозки
            required:
              - id
              - start_date
              - end_date
              - count
        available_time:
