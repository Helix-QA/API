      summary: Получить привязанные карты клиента {credit_card}
      operationId: credit_card
      description: |
        Метод возвращает массив с привязанными картами клиента.
        Рекомендация по порядку вызова методов при работе с рекуррентными платежами.
         При создании оплаты в рамках рекуррентного договора рекомендуется соблюдать
         следующий порядок вызова методов API:
         POST credit_card — создание / обновление платёжной связки;
         POST payment — создание оплаты.
         Это связано с тем, что платёжная связка должна быть сохранена в системе до
          момента создания оплаты. В противном случае при вызове метода payment может
           быть использована неактуальная или отсутствующая платёжная связка,
            что приведёт к некорректной обработке рекуррентного платежа.
            Соблюдение указанного порядка гарантирует использование актуальных
            данных и корректную работу рекуррентных платежей.
      tags:
        - Оплаты
      parameters:
        - name: usertoken
          in: header
          description: e.g. 7e8245d1-574f-4ce8-88ec-7e34358df45
          required: false
          schema:
            type: string
          example: 7e8245d1-574f-4ce8-88ec-7e34358df45
    post:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: "#/components/schemas/ResultResponse"
                  data:
                    description: Данные запроса
                    x-nullable: true
              example:
                result: true
                data: null
        "400":
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
      summary: Привязать карту {post_credit_card}
      operationId: post_credit_card
      description: ""
      tags:
        - Оплаты
