      summary: Расчет стоимости записи {record_cost}
      operationId: record_cost
      description: |
        Метод выполняет расчет стоимости визита с учетом предоставленных услуг записи и действующих маркетинговых акций, настроенных в системе.
         Для корректного применения скидок требуется передача заголовка запроса `usertoken`.
      tags:
