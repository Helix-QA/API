      summary: Стоимость корзины аренды {rental_cart_cost}
      operationId: rental_cart_cost
      description: "Метод возвращает структуру с ценой для оплаты. Учитывает все маркетинговые акции, если передан токен клиента"
      tags:
        - Аренда зала
      parameters:
        - name: cart
          in: query
          description: |
            Строка Json с массивом структур, содержащих параметры:
             - **"service_id"** (идентификатор номенклатуры)
             - **"room_id"** (идентификатор помещения)
             - **"record_array"** (структура с интервалами для расчета, возвращается в методе [{interval_rental}](#operation/interval_rental))
              - **date_time** - Время записи
              - **duration** - Длительность
              - **rental_id** - Идентификатор аренды
              - **optional_services**: - Дополнительные услуги
                - **service_id** - Идентификатор услуги
                - **count** - количество
                - **employee_id** - Идентификатор сотрудника (если это персональное занятие)
             - **cart_pay** (структура с передаваемыми оплатами, если не указан, в структура возврата не будет структуры "cart_pay")


            Пример такой строки:
            {"cart_array":[{"record_array": [{"date_time": "2023-02-27 19:00:00","duration": 120, "rental_id": "04e58135-05a0-11f1-b20b-001a7dda7115", "optional_services": [{"service_id":"ee176080-5bbe-11ef-b1c6-001a7dda7115","count":1},{"service_id":"ad0b3d26-a51e-11f0-b1fe-001a7dda7115","count":1,"employee_id":"3b680210-2d51-11ee-b18e-f02f7488d897"}]},{"date_time": "2023-02-27 22:00:00","duration": 60}],"service_id": "37515859-3721-11ec-b135-f02f7488d897","room_id": "e07e5bc4-2bf9-11ec-910f-2c4d546557dd"}], "cart_pay":{"pay_deposit":[{"id":"cb0a9cab-bb83-11ee-b1a3-f02f7488d897","val":"11600"},{"id":"f9c4beff-bb86-11ee-b1a3-f02f7488d897","val":""}],"pay_bonus":null,"pay_certificate":null}}
          required: true
          schema:
            type: string
        - name: club_id
          in: query
          description: Идентификатор структурной единицы
          required: true
          schema:
            type: string
        - name: promocode
          in: query
          description: Промокод
          schema:
            type: string
          example: test
        - name: usertoken
          in: header
          description: Ключ клиента
          required: false
          schema:
            type: string
          example: 7e8245d1-574f-4ce8-88ec-7e34358df45
