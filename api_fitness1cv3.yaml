      summary: Получить прайс-лист {price_list}
      operationId: price_list
      description: |
        Метод возвращает массив структур номенклатур. Цены возвращаются по виду цен, указанному в настройках внешней системы.
        - Параметр `type` используется для получения номенклатуры с переданным типом. Принимаются следующие значения:
         "membership" - Членство, "package" - Пакет услуг, "service" - Услуга, "modifier" - Модификатор.
        - Параметр `service_id` используется для получения номенклатуры, которая включает в себя переданную услугу.
        - Параметр `count` используется для указания количества необходимой номенклатуры.
        - Параметр `employee_id` используется для указания сотрудника.
        - Параметр `start_date` используется для указания корректного просчета цены согласно времени занятия.
        - Параметр `club_id` используется для указания клуба из которого нужно получить список покупок.
        - Параметр `course_id` используется для указания секции.
        - Параметр `section_id` используется для указания раздела. При указании вернутся номенклатуры, входящие в этот раздел.
        Идентификаторы разделов можно получить в методе "Разделы каталога"
        В ответе в modifier_type могут отдаваться следующие типы:
        - guest_visits - добавление гостевых визитов;
        - freeze_period - увеличение срока заморозки;
        - validity - увеличение срока действия;
        - adding_visits - добавление посещений;
        - adding_services - добавление услуг.
      tags:
        - Каталог
      parameters:
        - name: type
          in: query
          description: >-
            Тип номенклатуры ("membership" - членство, "package" - пакет услуг,
            "service" - услуга)
          schema:
            type: string
        - name: service_id
          in: query
          description: Идентификатор номенклатуры
          schema:
            type: string
        - name: count
          in: query
          description: Количество номенклатур
          schema:
            type: number
        - name: employee_id
          in: query
          description: Идентификатор сотрудника
          schema:
            type: string
        - name: start_date
          in: query
          description: Дата начала занятия
          schema:
            type: string
        - name: club_id
          in: query
          description: Идентификатор структурной единицы
          required: true
          schema:
            type: string
        - name: course_id
          in: query
          description: Идентификатор секции
          schema:
            type: string
        - name: section_id
          in: query
          description: Идентификатор группы
          schema:
            type: string
        - name: usertoken
          in: header
          description: Ключ клиента
          required: false
          schema:
            type: string
          example: 7e8245d1-574f-4ce8-88ec-7e34358df45
